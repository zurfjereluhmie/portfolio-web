name: Update GitHub Contributions

on:
  schedule:
    # Every Sunday at 01:00 UTC
    - cron: "0 1 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and write contributions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: zurfjereluhmie
          # Maximum events to scan from the GitHub API (max allowed: 100)
          MAX_EVENTS: 100
          # How many unique repos to keep (most recent first)
          MAX_REPOS: 10
        run: |
          node - <<'EOF'
          const https = require("https");

          const USERNAME  = process.env.GH_USERNAME;
          const TOKEN     = process.env.GITHUB_TOKEN;
          const MAX_EVENTS = parseInt(process.env.MAX_EVENTS, 10);
          const MAX_REPOS  = parseInt(process.env.MAX_REPOS,  10);
          const OUT_FILE   = "content/github/contributions.md";

          function get(url) {
            return new Promise((resolve, reject) => {
              const opts = {
                headers: {
                  "User-Agent": "portfolio-contributions-action",
                  "Authorization": `Bearer ${TOKEN}`,
                  "Accept": "application/vnd.github+json",
                },
              };
              https.get(url, opts, (res) => {
                let body = "";
                res.on("data", (chunk) => (body += chunk));
                res.on("end", () => resolve(JSON.parse(body)));
              }).on("error", reject);
            });
          }

          async function main() {
            // 1. Fetch public events
            const events = await get(
              `https://api.github.com/users/${USERNAME}/events/public?per_page=${MAX_EVENTS}`
            );

            if (!Array.isArray(events)) {
              console.error("Unexpected API response:", events);
              process.exit(1);
            }

            // 2. Filter for push/PR events, extract unique repo names (order = most recent first)
            const RELEVANT = new Set(["PushEvent", "PullRequestEvent"]);
            const seen = new Set();
            const repos = [];

            for (const event of events) {
              const repoName = event.repo?.name;
              if (!repoName || !RELEVANT.has(event.type) || seen.has(repoName)) continue;
              // Skip the portfolio repo itself
              if (repoName === `${USERNAME}/portfolio-web`) continue;
              seen.add(repoName);
              repos.push(repoName);
              if (repos.length >= MAX_REPOS) break;
            }

            // 3. Enrich each repo with description + language
            const contributions = [];
            for (const name of repos) {
              try {
                const info = await get(`https://api.github.com/repos/${name}`);
                contributions.push({
                  name,
                  url:         `https://github.com/${name}`,
                  description: info.description ?? "",
                  language:    info.language    ?? "",
                });
              } catch (err) {
                console.warn(`Failed to fetch ${name}:`, err.message);
              }
            }

            // 4. Build frontmatter YAML
            const lines = ["---", "contributions:"];
            for (const c of contributions) {
              lines.push(`  - name: ${JSON.stringify(c.name)}`);
              lines.push(`    url: ${JSON.stringify(c.url)}`);
              if (c.description) lines.push(`    description: ${JSON.stringify(c.description)}`);
              if (c.language)    lines.push(`    language: ${JSON.stringify(c.language)}`);
            }
            lines.push("---", "");

            // 5. Write file
            require("fs").writeFileSync(OUT_FILE, lines.join("\n"), "utf8");
            console.log(`Wrote ${contributions.length} contributions to ${OUT_FILE}`);
          }

          main().catch((err) => { console.error(err); process.exit(1); });
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet content/github/contributions.md || (
            git add content/github/contributions.md &&
            git commit -m "chore: update github contributions [skip ci]" &&
            git push
          )
