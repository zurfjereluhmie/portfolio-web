name: Update Visual Regression Snapshots

# Can be triggered manually from the Actions tab, or called by other workflows.
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Branch or SHA to check out and regenerate snapshots on"
        required: false
        type: string
        default: ""

jobs:
  update-snapshots:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Regenerate snapshots
        run: npx playwright test visual-regression --project=chromium --update-snapshots

      - name: Commit and push updated snapshots
        # Only run this step when triggered manually (workflow_dispatch),
        # not when called by another workflow (which handles its own commit/PR).
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tests/visual-regression.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No snapshot changes."
          else
            BRANCH="chore/update-snapshots-$(date +%Y%m%d%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "chore: update visual regression snapshots"
            git push origin "$BRANCH"
            gh pr create \
              --base "${{ github.ref_name }}" \
              --head "$BRANCH" \
              --title "chore: update visual regression snapshots" \
              --body "Automated snapshot update triggered by workflow dispatch."
          fi
