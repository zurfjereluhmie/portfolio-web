name: Update Visual Regression Snapshots

# Run manually from the Actions tab whenever UI intentionally changes and snapshots need to be updated.
on:
  workflow_dispatch:

jobs:
  update-snapshots:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Regenerate snapshots
        run: npx playwright test visual-regression --project=chromium --update-snapshots

      - name: Commit and push updated snapshots
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tests/visual-regression.spec.ts-snapshots/
          git diff --staged --quiet && echo "No snapshot changes." || (
            git commit -m "chore: update visual regression snapshots [skip ci]" &&
            git push
          )
